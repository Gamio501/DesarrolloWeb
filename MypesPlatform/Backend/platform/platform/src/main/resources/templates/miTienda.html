<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda - MypesPlatform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container">
        <div id="acceso-denegado" class="text-center section-block" style="display:none;">
            <h2>Acceso restringido</h2>
            <p>Solo el dueño de la tienda puede gestionar esta sección.</p>
            <a href="/vista/formlogin" class="btn" style="display:inline-block;margin-top:1rem;">Iniciar sesión</a>
        </div>

        <div id="panel-mi-tienda" style="display:none;">
            <h1>Mi Tienda</h1>
            <p class="section-subtitle">Gestiona la información de tu negocio. No puedes ver ni editar otras tiendas.</p>

            <div class="card store-detail-card" id="detalle-tienda"></div>

            <div class="actions-row">
                <a href="/vista/agregarProducto" class="btn">Gestionar productos</a>
                <a href="/vista/home" class="btn btn-outline">Volver al inicio</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        async function cargarMiTienda() {
            const denegado = document.getElementById("acceso-denegado");
            const panel = document.getElementById("panel-mi-tienda");

            if (!getToken()) {
                denegado.style.display = "block";
                return;
            }

            const admin = await esAdmin();
            if (!admin) {
                denegado.style.display = "block";
                document.querySelector("#acceso-denegado p").textContent =
                    "Esta sección es exclusiva para dueños de tienda (rol ADMIN).";
                return;
            }

            const resp = await fetch("/tienda/mi-tienda", { headers: authHeaders() });
            if (!resp.ok) {
                denegado.style.display = "block";
                document.querySelector("#acceso-denegado p").textContent =
                    "No tienes una tienda registrada o no se pudo cargar.";
                return;
            }

            const tienda = await resp.json();
            panel.style.display = "block";
            document.getElementById("detalle-tienda").innerHTML = `
                <img class="store-card-img" src="${imagenTienda(tienda.nombre)}" alt="${tienda.nombre}">
                <h2>${tienda.nombre}</h2>
                <p><strong>Dirección:</strong> ${tienda.direccion}</p>
                <p><strong>Teléfono:</strong> ${tienda.telefono}</p>
                <p><strong>ID:</strong> ${tienda.tiendaId}</p>
            `;
        }

        document.addEventListener("DOMContentLoaded", async function () {
            await initNavbar();
            await cargarMiTienda();
        });
    </script>
</body>

</html>
