<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel ADMIN - MypesPlatform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container">
        <div id="unauthorized-msg" class="text-center" style="display:none; margin-top: 3rem;">
            <h2>Acceso Denegado</h2>
            <p id="mensaje-error" style="color: #6b7280; margin-bottom: 2rem;">Debes iniciar sesión como administrador para ver esta página.</p>
            <a href="/vista/formlogin" class="btn" style="display: inline-block;">Ir a Login</a>
        </div>

        <div id="admin-panel" style="display:none;">
            <h1 class="mb-4">Panel de Administración</h1>
            <p id="infoTienda" style="font-weight: 500; color: #0056b3; margin-bottom: 2rem;"></p>

            <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                
                <div style="flex: 1; min-width: 300px;">
                    <div class="card">
                        <h2 class="card-title mb-4">Agregar Producto</h2>
                        <form id="formProducto" th:object="${ProductoDTO}">
                            <div class="form-group">
                                <label for="nombre">Nombre del producto</label>
                                <input type="text" id="nombre" placeholder="Ej. Pollo" th:field="*{nombre}" required>
                            </div>
                            <div class="form-group">
                                <label for="precio">Precio (S/)</label>
                                <input type="number" step="0.01" id="precio" placeholder="0.00" th:field="*{precio}" required>
                            </div>
                            <div class="form-group">
                                <label for="stock">Stock inicial</label>
                                <input type="number" id="stock" placeholder="Cantidad" th:field="*{stock}" required>
                            </div>
                            <button type="submit" class="mt-4">Guardar Producto</button>
                            <p id="mensaje-form" class="text-success text-center"></p>
                        </form>
                    </div>
                </div>

                <div style="flex: 2; min-width: 400px;">
                    <h2>Productos de mi tienda</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                </tr>
                            </thead>
                            <tbody id="listaProductos">
                                <tr><td colspan="3">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        async function cargarPanelAdmin() {
            const token = getToken();
            if (!token) {
                document.getElementById("unauthorized-msg").style.display = "block";
                return;
            }

            const check = await fetch("/productos/check-admin", { headers: authHeaders() });
            if (!check.ok) {
                document.getElementById("unauthorized-msg").style.display = "block";
                document.getElementById("mensaje-error").textContent = "Solo usuarios ADMIN pueden usar este panel.";
                return;
            }

            document.getElementById("admin-panel").style.display = "block";

            const tiendaResp = await fetch("/tienda/mi-tienda", { headers: authHeaders() });
            if (tiendaResp.ok) {
                const tienda = await tiendaResp.json();
                document.getElementById("infoTienda").textContent = "Administrando tienda: " + tienda.nombre;
            }

            const prodResp = await fetch("/productos/mi-tienda", { headers: authHeaders() });
            const tbody = document.getElementById("listaProductos");
            
            if (!prodResp.ok) {
                tbody.innerHTML = "<tr><td colspan='3'>Error al cargar productos</td></tr>";
                return;
            }

            const productos = await prodResp.json();
            if (productos.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3'>No hay productos registrados en tu tienda.</td></tr>";
                return;
            }

            tbody.innerHTML = productos.map(function (p) {
                return `<tr>
                            <td>${p.nombre}</td>
                            <td style="color: #0056b3; font-weight: 500;">S/ ${p.precio}</td>
                            <td>${p.stock}</td>
                        </tr>`;
            }).join("");
        }

        document.addEventListener("DOMContentLoaded", async function () {
            await initNavbar();
            await cargarPanelAdmin();
        });

        document.getElementById("formProducto").addEventListener("submit", async function (e) {
            e.preventDefault();
            const token = getToken();
            if (!token) return;

            const btn = this.querySelector('button');
            btn.textContent = "Guardando...";
            btn.disabled = true;

            const respuesta = await fetch("/productos/guardar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    nombre: document.getElementById("nombre").value,
                    precio: parseFloat(document.getElementById("precio").value),
                    stock: parseInt(document.getElementById("stock").value, 10)
                })
            });

            btn.textContent = "Guardar Producto";
            btn.disabled = false;

            if (respuesta.ok) {
                document.getElementById("mensaje-form").className = "text-success text-center";
                document.getElementById("mensaje-form").textContent = "Producto guardado con éxito.";
                document.getElementById("formProducto").reset();
                cargarPanelAdmin();
                setTimeout(() => document.getElementById("mensaje-form").textContent = "", 3000);
            } else {
                document.getElementById("mensaje-form").className = "text-error text-center";
                document.getElementById("mensaje-form").textContent = "Error al guardar el producto.";
            }
        });
    </script>
</body>
</html>
