<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda - MypesPlatform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container">

        <div class="card mb-4"
            style="text-align: center; padding: 2rem; background-color: #0056b3; color: white;">
            <h1 class="mb-4" th:text="${tienda.nombre}" style="color: white; margin-bottom: 0.5rem;"></h1>
            <p style="opacity: 0.9; margin: 0;">ID de la tienda: <span th:text="${tienda.tiendaId}"></span></p>
        </div>

        <h2>Productos en venta</h2>

        <div class="products-grid">
            <div class="card" th:each="p : ${productos}">
                <div class="card-title" th:text="${p.nombre}"></div>
                <div class="card-price" th:text="'S/ ' + ${p.precio}"></div>
                <div class="card-stock" th:text="'Stock disponible: ' + ${p.stock}"></div>
            </div>
            <div th:if="${#lists.isEmpty(productos)}" style="grid-column: 1 / -1;">
                <p>Esta tienda aún no tiene productos registrados.</p>
            </div>
        </div>

    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", initNavbar);
    </script>
</body>

</html>
