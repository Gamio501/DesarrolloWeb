<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MypesPlatform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center">Iniciar Sesión</h2>
            <form id="formLogin" th:object="${loginRequest}">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Tu usuario" th:field="*{username}" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña" th:field="*{password}" required>
                </div>
                <button type="submit">Ingresar</button>
                <p id="mensaje" class="text-error text-center"></p>
                <p class="text-center form-hint">
                    ¿No tienes cuenta? <a href="/vista/register">Regístrate aquí</a>
                </p>
            </form>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        document.getElementById("formLogin").addEventListener("submit", async function (e) {
            e.preventDefault();

            const btn = this.querySelector('button');
            btn.textContent = "Cargando...";
            btn.disabled = true;

            const respuesta = await fetch("/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: document.getElementById("username").value,
                    password: document.getElementById("password").value
                })
            });

            if (!respuesta.ok) {
                document.getElementById("mensaje").textContent = "Credenciales incorrectas o error.";
                btn.textContent = "Ingresar";
                btn.disabled = false;
                return;
            }

            const data = await respuesta.json();
            localStorage.setItem("token", data.token);
            window.location.href = "/vista/home";
        });

        document.addEventListener("DOMContentLoaded", initNavbar);
    </script>
</body>
</html>
